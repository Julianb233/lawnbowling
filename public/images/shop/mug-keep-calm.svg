<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0E6"/>
      <stop offset="100%" stop-color="#E8E0D0"/>
    </linearGradient>
    <linearGradient id="mug" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="50%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="600"/>
  <g transform="translate(280,300)">
    <rect x="-80" y="-80" width="160" height="170" rx="8" fill="url(#mug)"/>
    <ellipse cx="0" cy="90" rx="80" ry="8" fill="#A01515"/>
    <ellipse cx="0" cy="-80" rx="80" ry="10" fill="#C62828"/>
    <ellipse cx="0" cy="-80" rx="75" ry="8" fill="#A01515"/>
    <path d="M80,-30 Q130,-30 130,20 Q130,70 80,70" fill="none" stroke="#A01515" stroke-width="14" stroke-linecap="round"/>
    <path d="M80,-30 Q125,-30 125,20 Q125,65 80,70" fill="none" stroke="#C62828" stroke-width="8" stroke-linecap="round"/>
    <!-- Crown icon -->
    <path d="M-20,-50 L-25,-35 L-10,-42 L0,-30 L10,-42 L25,-35 L20,-50 Z" fill="#FFFFFF" opacity="0.9"/>
    <!-- Keep Calm text -->
    <text x="0" y="-10" fill="#FFFFFF" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="bold" letter-spacing="1.5">KEEP CALM</text>
    <text x="0" y="8" fill="#FFFFFF" font-size="8" font-family="system-ui,sans-serif" text-anchor="middle" letter-spacing="1">&amp;</text>
    <text x="0" y="28" fill="#FFFFFF" font-size="13" font-family="Georgia,serif" text-anchor="middle" font-weight="bold" letter-spacing="1.5">BOWL ON</text>
    <!-- Small bowl icon -->
    <circle cx="0" cy="50" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="50" r="3" fill="#FFFFFF" opacity="0.5"/>
    <!-- Steam -->
    <path d="M-15,-100 Q-20,-120 -10,-130" fill="none" stroke="#CCC" stroke-width="2" opacity="0.3"/>
    <path d="M5,-100 Q10,-120 0,-130" fill="none" stroke="#CCC" stroke-width="2" opacity="0.3"/>
  </g>
  <ellipse cx="300" cy="430" rx="100" ry="10" fill="rgba(0,0,0,0.06)"/>
</svg>