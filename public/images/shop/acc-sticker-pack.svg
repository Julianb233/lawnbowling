<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFF3C4"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="600"/>
  <g transform="translate(300,300)">
    <!-- Sticker 1: bowl circle -->
    <g transform="translate(-80,-60) rotate(-8)">
      <circle cx="0" cy="0" r="50" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
      <circle cx="0" cy="0" r="20" fill="#1B5E20"/>
      <circle cx="0" cy="0" r="14" fill="#2E7D32"/>
      <circle cx="0" cy="0" r="4" fill="#A8D5BA"/>
    </g>
    <!-- Sticker 2: jack -->
    <g transform="translate(80,-50) rotate(5)">
      <circle cx="0" cy="0" r="35" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
      <circle cx="0" cy="0" r="12" fill="#FFD54F"/>
      <circle cx="0" cy="0" r="8" fill="#FFC107"/>
      <text x="0" y="25" fill="#1B5E20" font-size="8" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="bold">JACK</text>
    </g>
    <!-- Sticker 3: text -->
    <g transform="translate(-60,60) rotate(3)">
      <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#1B5E20"/>
      <text x="0" y="5" fill="#FFFFFF" font-size="11" font-family="Georgia,serif" text-anchor="middle" font-weight="bold">BOWL MORE</text>
    </g>
    <!-- Sticker 4: emoji-style bowl -->
    <g transform="translate(70,50) rotate(-5)">
      <circle cx="0" cy="0" r="40" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
      <text x="0" y="8" font-size="30" text-anchor="middle">🎳</text>
    </g>
    <!-- Sticker 5: small star -->
    <g transform="translate(0,-110) rotate(10)">
      <rect x="-35" y="-15" width="70" height="30" rx="15" fill="#FFD54F"/>
      <text x="0" y="4" fill="#1B5E20" font-size="9" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="bold">TOUCHER!</text>
    </g>
    <!-- Sticker 6 -->
    <g transform="translate(-10,120) rotate(-3)">
      <rect x="-45" y="-15" width="90" height="30" rx="15" fill="#A8D5BA"/>
      <text x="0" y="4" fill="#0A2E12" font-size="9" font-family="system-ui,sans-serif" text-anchor="middle" font-weight="bold">ON THE GREEN</text>
    </g>
  </g>
</svg>