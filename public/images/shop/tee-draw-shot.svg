<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F5F1"/>
      <stop offset="100%" stop-color="#E0E8E2"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="600"/>
  <g transform="translate(300,310) scale(1.1)">
    <path d="M-130,-120 L-180,-80 L-140,-20 L-100,-60 Z" fill="#FAFAFA"/>
    <path d="M130,-120 L180,-80 L140,-20 L100,-60 Z" fill="#FAFAFA"/>
    <path d="M-100,-60 L-100,140 Q-100,160 -80,160 L80,160 Q100,160 100,140 L100,-60 L130,-120 Q80,-150 40,-150 L20,-130 Q0,-115 -20,-130 L-40,-150 Q-80,-150 -130,-120 Z" fill="#FAFAFA"/>
    <path d="M-20,-130 Q0,-115 20,-130 L40,-150 Q0,-165 -40,-150 Z" fill="#EFEFEF"/>
    <!-- Design: curved draw shot path -->
    <path d="M-40,70 Q-50,40 -30,10 Q-10,-20 10,-30 Q30,-40 35,-60" fill="none" stroke="#1B5E20" stroke-width="3" stroke-linecap="round"/>
    <!-- Small bowl at end of path -->
    <circle cx="-40" cy="70" r="8" fill="#1B5E20"/>
    <circle cx="-40" cy="70" r="5" fill="#2E7D32"/>
    <!-- Jack at start -->
    <circle cx="35" cy="-60" r="5" fill="#FFD54F"/>
    <!-- Arrow head on path -->
    <path d="M-38,58 L-40,70 L-48,60" fill="none" stroke="#1B5E20" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="110" fill="#1B5E20" font-size="13" font-family="Georgia,serif" text-anchor="middle" font-weight="bold" letter-spacing="2">THE DRAW SHOT</text>
  </g>
  <ellipse cx="300" cy="530" rx="120" ry="12" fill="rgba(0,0,0,0.06)"/>
</svg>