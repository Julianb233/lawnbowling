<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0E6"/>
      <stop offset="100%" stop-color="#E8E0D0"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="600"/>
  <!-- T-shirt shape -->
  <g transform="translate(300,310) scale(1.1)">
    <!-- Sleeves -->
    <path d="M-130,-120 L-180,-80 L-140,-20 L-100,-60 Z" fill="#1B5E20"/>
    <path d="M130,-120 L180,-80 L140,-20 L100,-60 Z" fill="#1B5E20"/>
    <!-- Body -->
    <path d="M-100,-60 L-100,140 Q-100,160 -80,160 L80,160 Q100,160 100,140 L100,-60 L130,-120 Q80,-150 40,-150 L20,-130 Q0,-115 -20,-130 L-40,-150 Q-80,-150 -130,-120 Z" fill="#1B5E20"/>
    <!-- Collar -->
    <path d="M-20,-130 Q0,-115 20,-130 L40,-150 Q0,-165 -40,-150 Z" fill="#14491A"/>
    <!-- Design on shirt: lawn bowl icon -->
    <circle cx="0" cy="10" r="35" fill="none" stroke="#A8D5BA" stroke-width="2.5"/>
    <circle cx="0" cy="10" r="28" fill="none" stroke="#A8D5BA" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="6" fill="#A8D5BA"/>
    <!-- Curved path line -->
    <path d="M-25,50 Q-10,30 0,10 Q10,-10 25,-30" fill="none" stroke="#A8D5BA" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Text on shirt -->
    <text x="0" y="80" fill="#A8D5BA" font-size="14" font-family="Georgia,serif" text-anchor="middle" font-weight="bold">JACK HIGH</text>
  </g>
  <!-- Shadow -->
  <ellipse cx="300" cy="530" rx="120" ry="12" fill="rgba(0,0,0,0.06)"/>
</svg>