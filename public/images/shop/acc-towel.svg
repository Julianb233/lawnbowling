<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F5F1"/>
      <stop offset="100%" stop-color="#E0E8E2"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="600"/>
  <g transform="translate(300,300)">
    <!-- Towel folded shape -->
    <rect x="-110" y="-70" width="220" height="150" rx="6" fill="#FAFAFA"/>
    <!-- Fold line -->
    <line x1="-110" y1="0" x2="110" y2="0" stroke="#E8E8E8" stroke-width="2"/>
    <!-- Towel texture lines -->
    <line x1="-100" y1="-55" x2="100" y2="-55" stroke="#F0F0F0" stroke-width="1"/>
    <line x1="-100" y1="-40" x2="100" y2="-40" stroke="#F0F0F0" stroke-width="1"/>
    <line x1="-100" y1="-25" x2="100" y2="-25" stroke="#F0F0F0" stroke-width="1"/>
    <line x1="-100" y1="15" x2="100" y2="15" stroke="#F0F0F0" stroke-width="1"/>
    <line x1="-100" y1="30" x2="100" y2="30" stroke="#F0F0F0" stroke-width="1"/>
    <line x1="-100" y1="45" x2="100" y2="45" stroke="#F0F0F0" stroke-width="1"/>
    <!-- Green stripe -->
    <rect x="-110" y="55" width="220" height="15" fill="#1B5E20" opacity="0.8"/>
    <!-- Embroidered bowl icon in corner -->
    <g transform="translate(70,-35)">
      <circle cx="0" cy="0" r="15" fill="none" stroke="#1B5E20" stroke-width="2"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#1B5E20" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="3" fill="#1B5E20"/>
    </g>
    <!-- Clip at top -->
    <rect x="80" y="-80" width="20" height="15" rx="3" fill="#999"/>
    <rect x="83" y="-80" width="14" height="8" rx="2" fill="#AAA"/>
  </g>
  <ellipse cx="300" cy="420" rx="110" ry="10" fill="rgba(0,0,0,0.05)"/>
</svg>