<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0E6"/>
      <stop offset="100%" stop-color="#E8E0D0"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="600"/>
  <g transform="translate(300,310) scale(1.1)">
    <path d="M-130,-120 L-180,-80 L-140,-20 L-100,-60 Z" fill="#1A1A1A"/>
    <path d="M130,-120 L180,-80 L140,-20 L100,-60 Z" fill="#1A1A1A"/>
    <path d="M-100,-60 L-100,140 Q-100,160 -80,160 L80,160 Q100,160 100,140 L100,-60 L130,-120 Q80,-150 40,-150 L20,-130 Q0,-115 -20,-130 L-40,-150 Q-80,-150 -130,-120 Z" fill="#1A1A1A"/>
    <path d="M-20,-130 Q0,-115 20,-130 L40,-150 Q0,-165 -40,-150 Z" fill="#111"/>
    <!-- Bold TOUCHER! text -->
    <text x="0" y="-10" fill="#FFFFFF" font-size="32" font-family="Georgia,serif" text-anchor="middle" font-weight="900" letter-spacing="3">TOUCHER!</text>
    <!-- Chalk mark line underneath -->
    <line x1="-55" y1="5" x2="55" y2="5" stroke="#FFD54F" stroke-width="3"/>
    <!-- Small bowl + jack touching -->
    <circle cx="-8" cy="45" r="14" fill="none" stroke="#A8D5BA" stroke-width="2"/>
    <circle cx="8" cy="45" r="5" fill="#FFD54F"/>
    <!-- Chalk spray dots -->
    <circle cx="-2" cy="35" r="1.5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="5" cy="30" r="1" fill="rgba(255,255,255,0.2)"/>
    <circle cx="15" cy="38" r="1.5" fill="rgba(255,255,255,0.2)"/>
  </g>
  <ellipse cx="300" cy="530" rx="120" ry="12" fill="rgba(0,0,0,0.06)"/>
</svg>