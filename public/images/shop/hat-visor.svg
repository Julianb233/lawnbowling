<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0E6"/>
      <stop offset="100%" stop-color="#E8E0D0"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="600" height="600"/>
  <g transform="translate(300,300)">
    <!-- Visor brim -->
    <ellipse cx="0" cy="10" rx="130" ry="28" fill="#E8E0D0"/>
    <ellipse cx="0" cy="8" rx="130" ry="26" fill="#FAFAFA"/>
    <!-- Headband -->
    <path d="M-100,0 Q-110,-30 -70,-50 Q0,-65 70,-50 Q110,-30 100,0 Z" fill="#FAFAFA"/>
    <path d="M-100,0 Q-110,-15 -80,-25 Q0,-35 80,-25 Q110,-15 100,0 Z" fill="#F0F0F0"/>
    <!-- Embroidered text -->
    <text x="0" y="-30" fill="#1B5E20" font-size="12" font-family="Georgia,serif" text-anchor="middle" font-weight="bold" letter-spacing="2">BOWLS CLUB</text>
    <!-- Small bowl embroidery -->
    <circle cx="0" cy="-10" r="4" fill="#1B5E20"/>
    <!-- Visor edge stitching -->
    <ellipse cx="0" cy="8" rx="125" ry="23" fill="none" stroke="#DDD" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Velcro strap hint -->
    <path d="M-85,-5 Q-95,5 -85,10" fill="none" stroke="#DDD" stroke-width="2"/>
  </g>
  <ellipse cx="300" cy="400" rx="100" ry="10" fill="rgba(0,0,0,0.06)"/>
</svg>